<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .birdcover {
            width: 200px;
            height: 120px;
            margin: 1px;
            border: dotted 2px red;
            background-image: url(bird150.jpg);
            background-size: cover;
            background-repeat: none;
            background-position: center center;
            margin-bottom: 50px;
        }

        .birdcontain {
            width: 200px;
            height: 120px;
            margin: 1px;
            border: dotted 2px red;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            background-image: url(bird150.jpg);
        }
    </style>
    <title>Document</title>
</head>

<body>
    <span class="bird">
        <div class="birdcover">
            132
        </div>
        <div class="birdcontain">
            123
        </div>
    </span>
</body>

</html>
