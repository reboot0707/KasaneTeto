<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑冠麻鷺觀察筆記</title>
    <link rel="stylesheet" href="styles/sp.css">
    <style>

    </style>
</head>

<body>
    <main class="bird-card">
        <h1>黑冠麻鷺：城市裡的地瓜鳥</h1>
        <h2 style="font-style: italic;">兀～</h2>
        <img class="img1" src="img/sweetpatato.webp" alt="" height="300">
        <img class="img2" src="img/sweetpatato.webp" alt="" height="300">
        <section class="features">
            <h2>外觀特徵</h2>
            <ul class="s1">
                <li>身體渾圓，站立時像一顆地瓜</li>
                <div class="s1-o">
                    <li>頭頂具有黑色冠羽</li>
                </div>
                <li>背部呈褐色並帶有細緻斑紋</li>
                <li>幼鳥全身有較明顯的白色斑點</li>
            </ul>
        </section>

        <section class="habitat">
            <h2>常見活動地點</h2>
            <ul>
                <li>校園草地</li>
                <li>都市公園</li>
                <li>樹林與灌木附近</li>
                <li>潮濕且容易找到食物的土地</li>
            </ul>
        </section>

        <section class="observation">
            <h2>觀察地瓜鳥的步驟</h2>
            <ol>
                <li>與鳥保持適當距離</li>
                <li>觀察牠是否安靜站立或緩慢行走</li>
                <li>記錄觀察內容
                    <ul>
                        <li>出現時間</li>
                        <li>所在位置</li>
                        <li>覓食或休息行為</li>
                    </ul>
                </li>
                <li>不要追趕、觸摸或餵食</li>
            </ol>
        </section>
    </main>
</body>

</html>
